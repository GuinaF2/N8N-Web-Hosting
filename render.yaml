services:
  - type: web
    name: n8n-agente-social
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: N8N_PORT
        value: "10000"
      - key: WEBHOOK_URL
        value: https://n8n-agente-social.onrender.com/
      - key: N8N_ENCRYPTION_KEY
        value: chave_seguranca_gerada_123
